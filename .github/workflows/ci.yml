name: Build and Test CSA Plugin

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # Required permissions to push the cached devcontainer image to GitHub Packages (GHCR)
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Run in Devcontainer
        uses: devcontainers/ci@v0.3
        with:
          # This caches your devcontainer image in your repo's GitHub Packages
          imageName: ghcr.io/${{ github.repository }}/etl-plugin-dev-env
          cacheFrom: ghcr.io/${{ github.repository }}/etl-plugin-dev-env
          push: always
          # These commands run INSIDE your devcontainer
          runCmd: |
            cmake -B build_clang -S .
            cmake --build build_clang --parallel
            clang++ -cc1 -load build_clang/libraries/EtlCheckerlib/libEtlChecker.so -analyze -analyzer-checker=custom.EtlAccessChecker libraries/EtlCheckerlib/tests/test_etl_access.cxx -verify

      - name: Upload Plugin Artifact
        # This step runs on the host runner. Because the devcontainer mounts the workspace, 
        # the .so file is available here to upload.
        uses: actions/upload-artifact@v4
        with:
          name: libEtlChecker
          path: build_clang/libraries/EtlCheckerlib/libEtlChecker.so
          if-no-files-found: error